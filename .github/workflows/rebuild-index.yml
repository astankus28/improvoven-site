name: Rebuild Index and Categories

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild recipe index
        run: node scripts/rebuild-index.js

      - name: Rebuild category pages
        run: node scripts/rebuild-categories.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Improv Oven Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Rebuild index and categories"
          git push

      - name: Wait for CDN deploy
        run: sleep 60

      - name: IndexNow (sitemap URLs)
        continue-on-error: true
        run: node scripts/submit-indexnow-sitemap.js
