name: Rebuild Index

on:
  push:
    branches: [main]
    paths-ignore:
      - 'recipes/**'
      - 'sitemap.xml'
      - 'recipes-data.json'

jobs:
  rebuild:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild index and sitemap
        run: node scripts/rebuild-index.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Improv Oven Bot"
          git add recipes/index.html sitemap.xml
          git diff --staged --quiet || git commit -m "🔄 Rebuild index"
          git pull --rebase origin main
          git push
