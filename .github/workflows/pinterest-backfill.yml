name: Pinterest Backfill

on:
  workflow_dispatch:
    inputs:
      last:
        description: "Post last N recipes (optional)"
        required: false
        default: ""
      since:
        description: "Post recipes on/after YYYY-MM-DD (optional)"
        required: false
        default: ""
      slugs:
        description: "Specific slugs (space or newline separated, optional)"
        required: false
        default: ""
      delay_ms:
        description: "Delay between pins in ms"
        required: false
        default: "20000"
      dry_run:
        description: "Dry run only (no Pinterest API calls)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
      # Backfills target already-live pages; skip the 90s per-pin deploy wait.
      PINTEREST_DEPLOY_WAIT: "0"
      PINTEREST_MAX_RETRIES: "3"
      PINTEREST_RETRY_BASE_DELAY_MS: "5000"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Pinterest backfill
        run: |
          set -euo pipefail

          ARGS=()

          if [ -n "${{ github.event.inputs.last }}" ]; then
            ARGS+=("--last" "${{ github.event.inputs.last }}")
          fi

          if [ -n "${{ github.event.inputs.since }}" ]; then
            ARGS+=("--since" "${{ github.event.inputs.since }}")
          fi

          if [ -n "${{ github.event.inputs.delay_ms }}" ]; then
            ARGS+=("--delay-ms" "${{ github.event.inputs.delay_ms }}")
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=("--dry-run")
          fi

          if [ -n "${{ github.event.inputs.slugs }}" ]; then
            while IFS= read -r slug; do
              slug="$(echo "$slug" | xargs)"
              if [ -n "$slug" ]; then
                ARGS+=("--slug" "$slug")
              fi
            done < <(echo "${{ github.event.inputs.slugs }}" | tr ' ' '\n')
          fi

          echo "Running: node scripts/backfill-pinterest.js ${ARGS[*]}"
          node scripts/backfill-pinterest.js "${ARGS[@]}"
