name: Daily Recipe Generator

on:
  schedule:
    - cron: '0 13 * * *'  # 8:00 AM EST
    - cron: '0 17 * * *'  # 12:00 PM EST
    - cron: '0 23 * * *'  # 6:00 PM EST
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-recipe:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate recipe and image
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-recipe.js

      - name: Commit and push new recipe
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Improv Oven Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🍳 Daily recipe: $(date +'%Y-%m-%d')"
          git push
