name: Daily Recipe Generator

on:
  schedule:
    - cron: '0 13 * * *'  # 8:00 AM EST  — Breakfast
    - cron: '0 17 * * *'  # 12:00 PM EST — Lunch
    - cron: '0 23 * * *'  # 6:00 PM EST  — Dinner
    - cron: '0 1 * * *'   # 8:00 PM EST  — Dessert
  workflow_dispatch:
    inputs:
      meal_type:
        description: 'Meal type to generate'
        required: false
        default: 'any'
        type: choice
        options:
          - any
          - breakfast
          - lunch
          - dinner
          - dessert

jobs:
  generate-recipe:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine meal type
        id: meal
        run: |
          HOUR=$(date -u +%H)
          INPUT_TYPE="${{ github.event.inputs.meal_type }}"
          if [ -n "$INPUT_TYPE" ] && [ "$INPUT_TYPE" != "any" ]; then
            echo "type=$INPUT_TYPE" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "13" ]; then
            echo "type=breakfast" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "17" ]; then
            echo "type=lunch" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "23" ]; then
            echo "type=dinner" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "01" ]; then
            echo "type=dessert" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "type=any" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate recipe and image
        if: steps.meal.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MEAL_TYPE: ${{ steps.meal.outputs.type }}
        run: |
          echo "🍽️ Generating $MEAL_TYPE recipe..."
          node scripts/generate-recipe.js

      - name: Commit and push new recipe
        if: steps.meal.outputs.skip != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Improv Oven Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🍳 ${{ steps.meal.outputs.type }} recipe: $(date +'%Y-%m-%d')"
          git push
